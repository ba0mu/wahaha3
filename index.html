    // ==================== SYNTHETIC RETRO AUDIO SYSTEM ====================
    let audioCtx = null;
    function getAudioContext() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      } catch (err) {
        console.warn("Speech/audio error:", err);
      }
      return audioCtx;
    }

    function playRetroClick() {
      const ctx = getAudioContext();
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
      osc.start(t);
      osc.stop(t + 0.09);
    }

    function playRetroBubble() {
      const ctx = getAudioContext();
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(600, t + 0.15);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.16);
    }

    function playRetroOption() {
      const ctx = getAudioContext();
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, t);
      osc.frequency.setValueAtTime(659.25, t + 0.06);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.16);
    }

    function playRetroSuccess() {
      const ctx = getAudioContext();
      if (!ctx) return;
      const t = ctx.currentTime;
      const freqs = [523.25, 659.25, 783.99, 1046.50];
      freqs.forEach((freq, idx) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t + idx * 0.08);
        gain.gain.setValueAtTime(0, t + idx * 0.08);
        gain.gain.linearRampToValueAtTime(0.1, t + idx * 0.08 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, t + idx * 0.08 + 0.12);
        osc.start(t + idx * 0.08);
        osc.stop(t + idx * 0.08 + 0.15);
      });
    }

    function playRetroPage() {
      const ctx = getAudioContext();
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, t);

      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.start(t);

    }

                    <div className="flex justify-between text-[8px] scale-95 leading-none mb-0.5">
                      <span className="font-black">酸甜感性 F / T</span>
                      <span className="text-emerald-900/60 font-black">{result.mbtiDetails.decision}</span>
                    </div>
                    <div className="w-full h-2 bg-white/75 border border-emerald-950/25 rounded-full overflow-hidden p-[1px]">
                      <div className="h-full bg-yellow-400 rounded-full" style={{ width: '92%' }} />
                    </div>
                  </div>
                </div>
              </div>

              {/* Personality description with beautiful block styling */}
              <div className="bg-white/30 border border-emerald-950/10 rounded-2xl p-3 shadow-none mt-1">
                <p className="text-[10.5px] md:text-[11px] text-emerald-950/85 leading-relaxed font-sans font-medium font-medium">
                  {result.description}
                </p>
              </div>

              {/* Matching rows with spacious padding */}
              <div className="grid grid-cols-2 gap-3 text-[10px] font-bold mt-1">
                <div className="bg-yellow-100/35 border border-emerald-950/10 rounded-2xl p-2.5 flex flex-col justify-center shadow-sm">
                  <p className="text-[8px] text-amber-950 font-black leading-none">🎒 童心守护法宝</p>
                  <p className="text-emerald-950 font-bold font-sans mt-2 leading-none text-[10px]">{result.vintageObject}</p>
                </div>

                <div className="bg-purple-100/35 border border-emerald-950/10 rounded-2xl p-2.5 flex flex-col justify-center shadow-sm">
                  <p className="text-[8px] text-purple-950 font-black leading-none font-sans">🍬 酸甜契合伙伴</p>
                  <p className="text-emerald-950 font-bold font-sans mt-2 leading-none text-[10px]">{result.goldenRatio.split(' · ')[0]}</p>
                </div>
              </div>

              {/* Mini QR stamp block with dashed line separation */}
              <div className="border-t border-dashed border-emerald-950/15 pt-3 mt-2.5 flex items-center gap-3">
                <div className="w-9 h-9 bg-white border border-dashed border-emerald-950/30 rounded flex items-center justify-center p-1 shrink-0 rotate-[-3deg] shadow-sm">
                  <svg viewBox="0 0 24 24" className="w-full h-full text-[#111827]">
                    <path d="M 0 0 H 8 V 8 H 0 Z M 2 2 H 6 V 6 H 2 Z" />
                    <path d="M 16 0 H 24 V 8 H 16 Z M 18 2 H 22 V 6 H 18 Z" />
                    <path d="M 0 16 H 8 V 24 H 0 Z M 2 18 H 6 V 22 H 2 Z" />
                    <path d="M 10 10 H 14 V 14 H 10 Z" />
                    <rect x="16" y="16" width="3" height="3" />
                    <rect x="20" y="20" width="3" height="3" />
                  </svg>
                </div>
                <div className="flex flex-col text-[8.5px] text-emerald-900/60 font-sans leading-tight">
                  <p className="font-extrabold text-emerald-950">📌 童年足迹:</p>
                  <p className="italic text-gray-600">{result.childhoodScene}</p>
                </div>
              </div>

            </div>

            {/* Bottom button controls */}
            <div className="flex flex-col gap-1.5 w-full max-w-[360px] mx-auto z-10 mb-1">
              <div className="grid grid-cols-2 gap-2">
                <button
                  onClick={handleDownload}
                  disabled={downloading}
                  className="bg-red-500 hover:bg-red-600 text-white font-extrabold text-[12px] py-2 rounded-xl border border-emerald-950 shadow-sm cursor-pointer active:scale-98"
                >
                  {downloading ? '保存中...' : '保存纪念海报'}
                </button>
                
                <button
                  onClick={() => { playRetroClick(); onRestart(); }}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-[12px] py-1.5 rounded-xl border border-emerald-950 shadow-sm cursor-pointer active:scale-98"
                >
                  重温回忆之旅
                </button>
              </div>

              <button
                onClick={() => { playRetroClick(); onGoBack(); }}
                className="w-full bg-white hover:bg-gray-100 text-slate-700 font-bold py-1 px-3 rounded-lg border border-emerald-950/30 text-[9px] cursor-pointer"
              >
                返回上一步，重新选择
              </button>

              <p className="text-[7.5px] text-center text-emerald-950/60 font-semibold uppercase leading-none mt-0.5">
                截图并保存海报后分享吧 · 哇哈哈 30 周年纪念
              </p>
            </div>

          </div>
        </div>
      );
    }

    // --- MAIN APP FRAME CONTROLLER (Strictly styled viewport with centered phone view for flawless aspect scaling) ---
    function App() {
      const [page, setPage] = useState('cover');
      const [userName, setUserName] = useState('时光死党');
      const [selectedGender, setSelectedGender] = useState('boy');
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState([]);

      const startQuiz = (name, gender) => {
        setUserName(name);
        setSelectedGender(gender);
        setAnswers([]);
        setCurrentIndex(0);
        setPage('q1');
        playRetroPage();
      };

      const handleSelectOption = (option) => {
        const updated = [...answers, option];
        setAnswers(updated);

        if (currentIndex < QUESTIONS.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setPage(`q${currentIndex + 2}`);
          playRetroPage();
        } else {
          setPage('result');
          playRetroPage();
        }
      };

      const handleGoBack = () => {
        playRetroPage();
        if (page === 'cover') return;

        if (page === 'result') {
          setCurrentIndex(QUESTIONS.length - 1);
          setAnswers(prev => prev.slice(0, -1));
          setPage(`q${QUESTIONS.length}`);
          return;
        }

        if (currentIndex === 0) {
          setPage('cover');
          setAnswers([]);
        } else {
          const prevIdx = currentIndex - 1;
          setCurrentIndex(prevIdx);
          setAnswers(prev => prev.slice(0, -1));
          setPage(`q${prevIdx + 1}`);
        }
      };

      const handleRestart = () => {
        setPage('cover');
        setAnswers([]);
        setCurrentIndex(0);
        playRetroPage();
      };

      const renderView = () => {
        if (page === 'cover') {
          return <CoverPage onStartQuiz={startQuiz} />;
        }
        if (page === 'result') {
          return (
            <ResultPage
              answers={answers}
              userName={userName}
              selectedGender={selectedGender}
              onRestart={handleRestart}
              onGoBack={handleGoBack}
            />
          );
        }
        return (
          <QuestionPage
            question={QUESTIONS[currentIndex]}
            currentIndex={currentIndex}
            totalQuestions={QUESTIONS.length}
            userName={userName}
            onSelectOption={handleSelectOption}
            onGoBack={handleGoBack}
          />
        );
      };

      return (
        <div className="w-screen h-screen bg-[#1E293B] retro-grid flex items-center justify-center p-0 md:p-6 select-none overflow-hidden relative">
          
          {/* Main H5 Container Shell adhering strictly to Aspect for Mobile and Desktop Adaptation */}
          <div className="h5-container">

            {/* Viewport container */}
            <div className="w-full h-full flex-grow relative overflow-hidden">
              {renderView()}
            </div>
          </div>

        </div>
      );
    }

    // Render inside the Mount Node
    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App />);
  </script>
</body>
</html>
